name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: smoke artifact
        if: matrix.os != 'windows-latest'
        run: ./target/${{ matrix.target }}/release/gpur --version
      - name: package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -C target/${{ matrix.target }}/release -czf gpur-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gpur
      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gpur.exe -DestinationPath gpur-${{ github.ref_name }}-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: gpur-${{ matrix.target }}
          path: gpur-*.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: create GitHub release
        run: gh release create ${{ github.ref_name }} gpur-*.tar.gz gpur-*.zip --title ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
